<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HEN Cheats Collection - by TeeKay87</title>
    <meta name="description" content="The largest cheats collection on the web for both PS4 and PS5." />
    <link rel="canonical" href="https://raw.githack.com/TeeKay87/HEN-Cheats-Collection/master/list/index.html" />

	<!-- Open Graph Meta -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HEN Cheats Collection" />
    <meta property="og:title" content="HEN Cheats Collection - by TeeKay87" />
    <meta property="og:description" content="The largest cheats collection on the web for both PS4 and PS5." />
    <meta property="og:url" content="https://raw.githack.com/TeeKay87/HEN-Cheats-Collection/master/list/index.html" />
    <meta property="og:image" content="https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/list/meta-image.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="HEN Cheats Collection banner" />

	<!-- Twitter Meta -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HEN Cheats Collection - by TeeKay87" />
    <meta name="twitter:description" content="The largest cheats collection on the web for both PS4 and PS5." />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/TeeKay87/HEN-Cheats-Collection/master/list/meta-image.png?v=1" />
    <meta name="twitter:image:alt" content="HEN Cheats Collection banner" />

    <meta name="theme-color" content="#0b1020" />

    <link rel="preconnect" href="https://image.api.playstation.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header" id="siteHeader">
        <div class="header-inner">
          <a
            class="brand-link"
            href="https://github.com/TeeKay87/HEN-Cheats-Collection"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open HEN Cheats Collection on GitHub"
          >
            <h1>HEN Cheats Collection</h1>
          </a>
          <p class="brand-subtitle">Created by TeeKay87</p>

          <div class="search-stack">
            <label class="sr-only" for="searchInput">Search by ID, title, or cheat creator</label>
            <div class="search-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M10.5 4a6.5 6.5 0 1 0 0 13a6.5 6.5 0 0 0 0-13Zm0-2a8.5 8.5 0 1 1 0 17a8.5 8.5 0 0 1 0-17Zm9.207 18.793-4.386-4.386 1.414-1.414 4.386 4.386-1.414 1.414Z"
                />
              </svg>
              <input
                id="searchInput"
                type="search"
                autocomplete="off"
                spellcheck="false"
                placeholder="Search by ID, title, or cheat creator"
              />
              <div class="favorites-toggle" role="group" aria-label="Entry filter">
                <button type="button" class="toggle-btn is-active" data-filter="all">All</button>
                <button type="button" class="toggle-btn" data-filter="favorites">Favorites</button>
              </div>
            </div>
            <p class="results-line" id="resultsLine">Loading collection…</p>
          </div>
        </div>
      </header>

      <main class="page-main" id="pageMain">
        <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>
        <div class="empty-state hidden" id="emptyState">
          <h2>No matches found</h2>
          <p>Try a different title, game ID, or cheat creator.</p>
        </div>
        <div class="status-message" id="statusMessage">Loading data files…</div>
      </main>

      <footer class="site-footer" id="siteFooter">
        <div class="footer-inner">
          <a
            class="support-link"
            href="https://github.com/sponsors/TeeKay87"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span>Support me on GitHub</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </a>
          <p class="footer-generated" id="footerGenerated"></p>
          <p class="footer-created" id="footerCreated"></p>
        </div>
      </footer>
    </div>

    <div class="modal-root hidden" id="modalRoot" aria-hidden="true">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <section
        class="game-modal"
        id="gameModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button type="button" class="modal-close" id="modalClose" aria-label="Close game details">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M18.3 5.71 12 12l6.3 6.29-1.42 1.42L10.59 13.4l-6.3 6.3-1.41-1.42L9.17 12l-6.3-6.29L4.29 4.3l6.3 6.3 6.29-6.3z"
            />
          </svg>
        </button>
        <div class="modal-hero" id="modalHero">
          <div class="modal-hero-overlay"></div>
          <div class="modal-hero-content">
            <p class="modal-kicker" id="modalIdVersion"></p>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta-row">
              <span class="modal-pill" id="modalCheatsTotal"></span>
              <span class="modal-pill" id="modalCreators"></span>
            </div>
          </div>
        </div>
        <div class="modal-body">
		  <!--
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">Game ID</span>
              <span class="detail-value" id="modalGameId"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Version</span>
              <span class="detail-value" id="modalVersion"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Available formats</span>
              <span class="detail-value" id="modalFormats"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Favorite</span>
              <button type="button" class="modal-favorite-btn" id="modalFavoriteBtn"></button>
            </div>
          </div>
		  -->

          <div class="cheat-groups" id="modalCheatGroups"></div>
        </div>
      </section>
    </div>

    <template id="cardTemplate">
      <article class="game-card">
        <button type="button" class="favorite-btn" aria-label="Toggle favorite"></button>
        <button type="button" class="card-hitbox" aria-label="Open details"></button>
        <div class="card-media">
          <img class="card-cover" alt="" loading="lazy" decoding="async" />
          <div class="card-overlay"></div>
        </div>
        <div class="card-content">
          <h2 class="card-title"></h2>
          <div class="card-meta">
            <span class="card-id"></span>
            <span class="card-version"></span>
          </div>
          <div class="card-bottom">
            <span class="card-cheats"></span>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
